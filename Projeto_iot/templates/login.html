{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Projeto IoT</title>
    <link rel="stylesheet" href="{% static 'index.css' %}">
</head>
<body>

    <main class="login-container">
        <section class="login-card">
            <h1>Projeto IoT</h1>
            <p>Sistema de Elevador Inteligente</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input 
                        type="text" 
                        id="username"
                        name="username" 
                        placeholder="Digite seu usuário" 
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        placeholder="Digite sua senha" 
                        required
                    >
                </div>

                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>

</body>
</html>
