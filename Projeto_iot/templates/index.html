{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Elevador IoT</title>
  <link rel="stylesheet" href="{% static 'index.css' %}">
</head>
<body>

  <main class="container">
    <section class="painel">
      <div class="info">
        <span class="tag">Projeto IoT</span>
        <h1>Elevador Inteligente</h1>
        <p>Controle o elevador de 3 andares pela internet usando Django + Arduino/ESP.</p>

        <div class="status">
          <strong>Status:</strong>
          <span id="status">Aguardando comando...</span>
        </div>

        <div class="botoes">
          <button onclick="chamarElevador(1)">1º Andar</button>
          <button onclick="chamarElevador(2)">2º Andar</button>
          <button onclick="chamarElevador(3)">3º Andar</button>
        </div>
      </div>

      <div class="elevador-box">
        <div class="predio">
          <div class="andar">3</div>
          <div class="andar">2</div>
          <div class="andar">1</div>
          <div id="cabine" class="cabine andar-1">▲</div>
        </div>
      </div>
    </section>
  </main>

  <script src="{% static 'script.js' %}"></script>
</body>
</html>
